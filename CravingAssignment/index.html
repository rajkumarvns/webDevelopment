<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cravings Assignment</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header
      id="navBar"
      class="sticky-top top-0 z-99 d-flex justify-content-between align-items-center p-0 border-bottom"
    >
      <!-- Logo -->
      <div class="logoDiv ms-5">
        <img
          src="./images/logo.png"
          alt="Logo"
          style="width: 86px; height: 55px"
        />
      </div>

      <!-- Buttons aligned right -->
      <div class="d-flex gap-2">
        <button type="button" class="login">Login</button>
        <button type="button" class="btn register-btn border-1 me-5">
          Register
        </button>
      </div>
    </header>
    <!-- main -->
    <div class="slider">
      <img src="./images/bgImage.jpg" class="vh-100 vw-100" alt="image" />
      <div>
        <div>
          <h1>Your Favorite Food, <br />Delieverd Fast</h1>
          <p>
            Order for thousands of restaurants and get it delieverd to your
            doorstep
          </p>
        </div>
        <button type="submit">Sign Up</button>
        <button type="submit">Order Now</button>
        <input type="text" placeholder="Search restaurants or dishes..." />
      </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
