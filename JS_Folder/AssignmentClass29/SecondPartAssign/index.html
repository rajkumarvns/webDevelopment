<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment1Two3</title>
    <!-- external css -->
    <link rel="stylesheet" href="style.css" />
    <!-- bootstap link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Bootstrap icons link -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <form
      class="border border-black bg-secondary shadow rounded-3 m-5 p-5 w-25"
      onsubmit="Submit(event)"
    >
      <h1
        class="d-flex justify-content-center text-primary border rounded-5 bg-white"
      >
        Assignment 1
      </h1>
      <input
        type="text"
        class="form-control mb-3 mt-5 bg-info text-white border-0 shadow"
        id="fullName"
        placeholder="Enter Name"
      />
      <input
        type="text"
        class="form-control mb-3 bg-info text-white border-0 shadow"
        id="CityName"
        placeholder="Enter City"
      />
      <button
        type="submit"
        class="bg-success text-white rounded-5 fw-bold border-0 w-100"
      >
        Submit
      </button>
      <div
        class="border border-0 rounded-3 text-white bg-primary shadow container p-4 mt-5 divHide"
        id="dataCard"
      >
        <span>Name: </span>
        <span id="myData"></span> <br />
        <span>City: </span>
        <span id="myData2"></span>
      </div>
    </form>

    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
