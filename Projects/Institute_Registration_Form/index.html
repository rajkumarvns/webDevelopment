<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <div class="bg-primary p-3 text-center">
        <h2 class="text-white">Institute Registration Form</h2>
      </div>
    </header>
    <main>
      <div
        class="container my-4 px-3 py-4 px-md-5 py-md-5 bg-info-subtle rounded-3 border shadow border-primary border-2"
      >
        <form id="registrationFrom">
          <section class="bg-white p-3 rounded border mb-3 border-secondary">
            <div class="row">
              <div class="col-md-6 p-2 mt-2">
                <label for="fullName" class="form-label fw-bold"
                  >Full Name</label
                >
                <input
                  type="text"
                  name="fullName"
                  id="fullName"
                  class="form-control"
                  required
                  placeholder="Raj Gupta"
                />
                <span class="text-danger small" id="fullNameError"></span>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="email" class="form-label fw-bold">Email</label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="form-control"
                  required
                  placeholder="rajkumar966601@gmail.com"
                />
                <span class="text-danger small" id="emailError"></span>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="phone" class="form-label fw-bold"
                  >Mobile Number</label
                >
                <input
                  type="number"
                  name="phone"
                  id="phone"
                  class="form-control"
                  placeholder="8795000000"
                  required
                />
                <span class="text-danger small" id="phoneError"></span>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="dob" class="form-label fw-bold"
                  >Date of Birth</label
                >
                <input
                  type="date"
                  name="dob"
                  id="dob"
                  class="form-control"
                  placeholder="Raj Gupta"
                  required
                />
                <span class="text-danger small" id="dobError"></span>
              </div>
              <div
                class="col-12 p-2 mt-2 d-flex flex-wrap gap-3 align-items-center"
              >
                <label for="gender" class="form-label fw-bold me-3"
                  >Gender</label
                >
                <div class="form-check">
                  <input
                    type="radio"
                    name="gender"
                    id="male"
                    value="male"
                    class="form-check-input"
                  />
                  <label for="male" class="form-check-label">Male</label>
                </div>
                <div class="form-check">
                  <input
                    type="radio"
                    name="gender"
                    id="female"
                    value="female"
                    class="form-check-input"
                  />
                  <label for="female" class="form-check-label">Female</label>
                </div>
                <div class="form-check">
                  <input
                    type="radio"
                    name="gender"
                    id="others"
                    value="others"
                    class="form-check-input"
                  />
                  <label for="others" class="form-check-label">Others</label>
                </div>
              </div>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3 border-secondary">
            <div class="row">
              <div class="col-md-6 p-2 mt-2">
                <label for="qualification" class="form-label fw-bold"
                  >Last Completed Qualification</label
                >
                <select
                  name="qualification"
                  id="qualification"
                  class="form-select"
                  required
                >
                  <option value="">Select Qualification</option>
                  <option value="10">Matriculation</option>
                  <option value="12">Intermediate</option>
                  <option value="diploma">Diploma</option>
                  <option value="UG">Graduation</option>
                  <option value="PG">Post Graduation</option>
                </select>
                <span class="text-danger small" id="qualificationError"></span>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="marks" class="form-label fw-bold"
                  >Percentage/Grade</label
                >
                <input
                  type="text"
                  name="marks"
                  id="marks"
                  class="form-control"
                  required
                  placeholder="90% or A-F"
                />
                <span class="text-danger small" id="marksError"></span>
              </div>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3 border-secondary">
            <div class="row">
              <div class="col-md-6 p-2 mt-2">
                <label for="course" class="form-label fw-bold"
                  >Preferred Course</label
                >
                <select name="course" id="course" class="form-select" required>
                  <option value="">Select Course</option>
                  <option value="iitJee">IIT-JEE</option>
                  <option value="neet">NEET</option>
                  <option value="bankingExams">Banking Exams</option>
                  <option value="ca/cs">CA/CS</option>
                  <option value="upsc">UPSC</option>
                </select>
                <span class="text-danger small" id="courseError"></span>
              </div>
              <div
                class="col-md-6 p-2 mt-2 d-flex flex-wrap gap-3 align-items-center"
              >
                <label for="timings" class="form-label fw-bold me-3"
                  >Batch Timing Preference</label
                >
                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    id="morning"
                    value="morning"
                    class="form-check-input"
                  />
                  <label for="morning" class="form-check-label">Morning</label>
                </div>
                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    id="evening"
                    value="evening"
                    class="form-check-input"
                  />
                  <label for="evening" class="form-check-label">Evening</label>
                </div>
                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    id="afternoon"
                    value="afternoon"
                    class="form-check-input"
                  />
                  <label for="afternoon" class="form-check-label"
                    >Afternoon</label
                  >
                </div>
                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    id="weekends"
                    value="weekends"
                    class="form-check-input"
                  />
                  <label for="weekends" class="form-check-label"
                    >Weekends</label
                  >
                </div>
                <span class="text-danger small w-100" id="timingsError"></span>
              </div>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3 border-secondary">
            <div class="row">
              <div class="col-12 p-2 mt-2">
                <label for="address" class="form-label fw-bold">Address</label>
                <textarea
                  name="address"
                  id="address"
                  class="form-control"
                  required
                ></textarea>
                <span class="text-danger small" id="addressError"></span>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="city" class="form-label fw-bold">City</label>
                <input
                  type="text"
                  name="city"
                  id="city"
                  class="form-control"
                  placeholder="Mumbai"
                  required
                />
                <span class="text-danger small" id="cityError"></span>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="pin" class="form-label fw-bold">Pin Code</label>
                <input
                  type="text"
                  name="pin"
                  id="pin"
                  class="form-control"
                  placeholder="274404"
                />
                <span class="text-danger small" id="pinError"></span>
              </div>
            </div>
          </section>
          <section class="bg-white p-3 rounded border mb-3 border-secondary">
            <div class="row">
              <div class="col-md-6 p-2 mt-2">
                <label for="guardianName" class="form-label fw-bold"
                  >Guardian’s Full Name</label
                >
                <input
                  type="text"
                  id="guardianName"
                  name="guardianName"
                  class="form-control"
                  placeholder="Guardian’s Full Name"
                  required
                />
                <span class="text-danger small" id="guardianError"></span>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="guardianNumber" class="form-label fw-bold"
                  >Guardian Contact Number</label
                >
                <input
                  type="number"
                  id="guardianNumber"
                  name="guardianNumber"
                  class="form-control"
                  placeholder="Contact Number"
                  required
                />
                <span class="text-danger small" id="guardianNumberError"></span>
              </div>
            </div>
          </section>
          <section class="bg-light p-3 rounded border mb-3 border-secondary">
            <div class="row">
              <div class="col-md-6 p-2 mt-2">
                <label for="AddiInfo" class="form-label fw-bold"
                  >Additional Info</label
                >
                <select
                  name="AddiInfo"
                  id="AddiInfo"
                  class="form-select"
                  required
                >
                  <option value="">Select Additional Info</option>
                  <option value="friends">Friends</option>
                  <option value="onlineAd">Online Ad</option>
                  <option value="newspaper">Newspaper</option>
                  <option value="social_Medial">Social Media</option>
                  <option value="others">Others</option>
                </select>
              </div>
              <div class="col-md-6 p-2 mt-2">
                <label for="specialReq" class="form-label fw-bold"
                  >Special Requirements</label
                >
                <textarea
                  name="specialReq"
                  id="specialReq"
                  class="form-control"
                >
                </textarea>
              </div>
            </div>
          </section>
          <div class="d-flex justify-content-between">
            <button type="reset" class="btn btn-warning text-white">
              Clear
            </button>
            <button type="submit" class="btn btn-primary rounded-5">
              Submit
            </button>
          </div>
        </form>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
