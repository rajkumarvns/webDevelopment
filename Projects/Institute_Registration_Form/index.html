<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Institute Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <form>
      <div>
      <h2>Personal Information</h2>
        <label for="Name">full Name:</label>
        <input type="text" id="fullName" placeholder="Enter your Full Name" class="form-control" required>
        <label for="email">Email Address:</label>
        <input type="email" id="email" placeholder="Enter Your Email Address"class="form-control" required>
        <label for="phone">Mobile Number:</label>
        <input type="tel" id="phone" placeholder="Enter Your phone Numbre"class="form-control" required>
        <label for="phone">Date of Birth:</label>
        <input type="date" id="DOB"class="form-control" placeholder="Enter Your DOB" required>
        <div class="dropdownDe">
          <h2>Academic Details</h2>
          <select id="dropDown1" class="form-select" required>
            <option value="10th">10th</option>
            <option value="12th">12th</option>
            <option value="Graduate">Graduate</option>
            <option value="Postgraduate">Postgraduate</option>
            <option value="etc">etc...</option>
        </div>
        </select>
        <input type="text" id="Grade" placeholder="Grade"class="form-control" required>
        <div>
          <h2>Course Information</h2>
          <select  id="preferredCourse"class="form-select" required>preferred Course
          <option value="IIT-JEE">IIT-JEE</option>
          <option value="NEET">NEET</option>
          <option value="Banking Exams">Banking Exams</option>
          <option value="UPSC">UPSC</option>
          <option value="etc">etc...</option>
            </select>
        </div>
        <div>
          <h4>Batch Timing preferred</h4>
          <select name="Timing" id="Timing"class="form-select" required>Batch Time 
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
            <option value="Weekend">Weekend</option>
          </select>
          <h2>Address</h2>
          <textarea name="address" id="textAddress"class="form-control" required>
           

          </textarea> 
           <label for="city">City</label>
            <input type="text" id="city"class="form-control" required>
            <label for="pincode">PinCode</label>
            <input type="number" id="pincode"class="form-control" placeholder="Enter PinCode" required>

            <div id="GuardianDe">
              <label for="Name">full Name:</label>
        <input type="text" id="GuardianName"class="form-control" placeholder="Enter your Full Name" required>
            </div>

            <label for="phone">Mobile Number:</label>
        <input type="tel" id="phone"class="form-control" placeholder="Enter Your phone Numbre" required>
        </div>
            <div id="additionalInfo">
              <select name="hearAbout" id="hearAbout"class="form-select" required>How did you here about us
                <option value="friend">Friend</option>
                <option value="Online_Ad">Online Ad</option>
                <option value="newspaper">Newspaper</option>
                <option value="socialMedia">Social Media</option>
                <option value="Other">Other</option>
              </select>
              <h4>special Requirements</h4>
              <textarea name="socialText"class="form-control" id="socialText">
                
              </textarea>
            </div>
          
        </div>
        <button>submit</button>
        <button>Reset</button>
    </form>
    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
