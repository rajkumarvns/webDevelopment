<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="bg-primary-subtle border border-2 rounded-3 vh-100">
      <div class="h-50 w-50 bg-primary rounded-4">
        <div class="d-flex justify-content-center gap-5 pt-5">
          <input type="text" id="cityName" class="rounded-4" />
          <button onclick="getWeather()" class="rounded-5 border-0 fs-3 p-2">
            Get Weather
          </button>
        </div>

        <br />

        <div class="d-flex justify-content-center align-items-center">
          <label class="fs-3 text-warning"
            >Temp : <span id="Temperature">30</span>ºC</label
          >
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
