<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weather App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    class="bg-info bg-gradient d-flex justify-content-center align-items-center vh-100"
  >
    <div class="card weather-card border-0 shadow-lg text-center p-4 rounded-5">
      <h1 class="fw-bold text-primary mb-4">Weather App</h1>

      <div class="input-group mb-4">
        <input
          type="text"
          id="cityName"
          class="form-control rounded-start-pill p-3"
          placeholder="Enter city name"
        />

        <button
          onclick="getWeather()"
          class="btn btn-primary rounded-end-pill px-4"
        >
          <i class="bi bi-search fs-5"></i>
        </button>
      </div>

      <div class="mb-3">
        <i class="bi bi-cloud-sun-fill display-1 text-warning weather-icon"></i>
      </div>

      <h2 class="display-3 fw-bold text-dark">
        <span id="Temperature">30</span>°C
      </h2>

      <h3 id="cityText" class="text-secondary mb-4">Bhopal</h3>

      <div class="row mt-4">
        <div class="col-6">
          <div class="bg-light rounded-4 p-3 shadow-sm">
            <i class="bi bi-moisture text-primary fs-1"></i>

            <h5 id="humidity" class="fw-bold mt-2">60%</h5>

            <p class="text-muted mb-0">Humidity</p>
          </div>
        </div>

        <div class="col-6">
          <div class="bg-light rounded-4 p-3 shadow-sm">
            <i class="bi bi-wind text-success fs-1"></i>

            <h5 id="wind" class="fw-bold mt-2">5 km/h</h5>

            <p class="text-muted mb-0">Wind</p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
