<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- bootstrap icons link -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="vh-100 vw-100 d-flex justify-content-center align-items-center">
      <div class="w-25 bg-success shadow rounded-5 border mx-auto mt-5 p-3">
        <h1 class="text-center mb-3 text-warning fw-bold">Age Calculator</h1>
        <form
          class="p-3 d-grid flex-column gap-3 align-items-center d-flex w-100"
        >
          <label for="DOB" class="text-center text-white fw-bold"
            >Enter Your Date of Birth</label
          >
          <input type="date" name="DOB" id="DOB" class="form-control" />
          <label for="CurrentDate" class="text-center text-white fw-bold"
            >Choose Current Date</label
          >
          <input
            type="date"
            name="CurrentDate"
            id="CurrentDate"
            class="form-control"
          />
          <button type="submit" class="btn btn-primary w-50 rounded-5">
            Calculator Age
          </button>
          <div class="fw-bold text-white text-center">
            Your Age is : <span id="MaxAge"></span> Years
            <span id="Month"></span> Months <span id="Days"></span> Day
          </div>
        </form>
      </div>
    </div>
    <script src="./script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
