<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <img src="BgImg/image.png" alt="Calculate" class="vh-100 vw-100" />
      <div class="position-absolute top-50 start-50 translate-middle">
        <div
          class="rounded-top-4 px-2 py-4 border border-2 border-danger bg-success-subtle"
        >
          <div class="text-end w-100" id="text"></div>
        </div>
        <div
          class="buttons d-grid gap-3 border border-2 border-danger p-4 rounded-4 rounded-top-0 bg-primary-subtle border-top-0"
          id="keydown"
        >
          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('AC')"
          >
            AC
          </button>
          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('C')"
          >
            C
          </button>
          <button
            class="bg-white rounded-circle p-3 border-0 fs-5 fw-bold d-flex justify-content-center align-items-center"
            onclick="Calculate('%')"
          >
            %
          </button>
          <button
            class="rounded-circle p-3 border-0 bg-warning fs-5 fw-bold d-flex justify-content-center align-items-center"
            onclick="Calculate('/')"
          >
            /
          </button>

          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('7')"
          >
            7
          </button>
          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('8')"
          >
            8
          </button>
          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('9')"
          >
            9
          </button>
          <button
            class="bg-warning rounded-circle p-3 border-0 fs-5 fw-bold d-flex justify-content-center align-items-center"
            onclick="Calculate('*')"
          >
            *
          </button>

          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('4')"
          >
            4
          </button>
          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('5')"
          >
            5
          </button>
          <button
            class="bg-white rounded-circle p-3 border-0 fw-bold"
            onclick="Calculate('6')"
          >
            6
          </button>
          <button
            class="bg-warning rounded-circle p-3 border-0 fs-5 fw-bold d-flex justify-content-center align-items-center"
            onclick="Calculate('-')"
          >
            -
          </button>

          <button
            class="bg-white rounded-5 p-3 border-0 fw-bold"
            onclick="Calculate('1')"
          >
            1
          </button>
          <button
            class="bg-white rounded-5 p-3 border-0 fw-bold"
            onclick="Calculate('2')"
          >
            2
          </button>
          <button
            class="bg-white rounded-5 p-3 border-0 fw-bold"
            onclick="Calculate('3')"
          >
            3
          </button>
          <button
            class="bg-warning rounded-5 p-3 border-0 fs-5 fw-bold d-flex justify-content-center align-items-center"
            onclick="Calculate('+')"
          >
            +
          </button>

          <button
            class="bg-white rounded-5 p-3 border-0 fw-bold"
            onclick="Calculate('0')"
          >
            0
          </button>
          <button
            class="bg-white rounded-5 p-3 border-0 d-flex justify-content-center fw-bold"
            onclick="Calculate('.')"
          >
            .
          </button>
          <button
            class="bg-success rounded-5 p-3 border-0 equal text-white fw-bold"
            onclick="Calculate('=')"
          >
            =
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
