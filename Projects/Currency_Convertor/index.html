<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Currency Converter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-12">
          <div class="converter-box shadow-lg">
            <h1 class="text-center mb-4 fw-bold text-warning">
              <i class="bi bi-currency-exchange"></i>

              Currency Converter
            </h1>

            <div class="row align-items-center">
              <div class="col-md-5 text-center">
                <img id="flag1" class="flag-img mb-2" width="70" />

                <select id="country1" class="form-select p-3">
                  <option value="">Select Country</option>
                </select>
              </div>

              <div class="col-md-2 text-center my-3 my-md-0">
                <button class="btn btn-dark swap-btn" onclick="swapCurrency()">
                  ⇄
                </button>
              </div>

              <div class="col-md-5 text-center">
                <img id="flag2" class="flag-img mb-2" width="70" />

                <select id="country2" class="form-select p-3">
                  <option value="">Select Country</option>
                </select>
              </div>
            </div>

            <input
              type="number"
              id="orgAmount"
              class="form-control p-3 mt-4"
              placeholder="Enter amount"
            />

            <p id="errorMessage" class="text-danger fw-bold mt-2"></p>

            <button
              id="convertBtn"
              class="btn btn-primary w-100 p-3 fw-bold"
              onclick="convertCurrency()"
            >
              Convert Currency
            </button>

            <div id="resultBox" class="mt-4">
              <h2 id="newAmount">Converted Amount</h2>

              <p id="exchangeRate"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
