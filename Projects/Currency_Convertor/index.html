<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Convertor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="currency-Convertor">
      <h2 class="bg-warning text-black rounded-1 shadow p-2 fw-bold">
        Currency Convertor
      </h2>
      <div class="d-flex">
        <select
          name="country"
          id="country"
          class="form-check w-50 mb-5 p-2 rounded-2 me-5"
        >
          <option value="India">India</option>
          <option value="USA">USA</option>
          <option value="China">China</option>
          <option value="Nepal">Nepal</option>
          <option value="Dubai">Dubai</option>
        </select>
        <select
          name="country"
          id="country"
          class="form-check w-50 mb-5 p-2 rounded-2"
        >
          <option value="USA">USA</option>
          <option value="India">India</option>
          <option value="Dubai">Dubai</option>
          <option value="Nepal">Nepal</option>
          <option value="China">China</option>
        </select>
      </div>

      <input type="text" id="CurrencyOutput" placeholder="Currency Output" />
      <button type="submit" onclick="checkCurrency()" class="mb-4">
        Convert
      </button>
      <!-- <button onclick="resetCurrency()">Reset</button> -->

      <div id="message" class="fs-2">Converted Amount:</div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
