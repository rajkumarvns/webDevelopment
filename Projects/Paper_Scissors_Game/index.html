<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rock Paper Scissors</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-dark text-white">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 text-center">
          <!-- Heading -->
          <h1 class="display-4 fw-bold text-warning mb-5">
            Rock Paper Scissors
          </h1>

          <!-- Buttons -->
          <div class="d-flex justify-content-center gap-4 flex-wrap mb-4">
            <button
              class="btn btn-danger btn-lg px-4 py-3"
              onclick="playGame('rock')"
            >
              <i class="bi bi-circle-fill"></i><br />
              Rock
            </button>

            <button
              class="btn btn-warning btn-lg px-4 py-3 text-dark"
              onclick="playGame('paper')"
            >
              <i class="bi bi-file-earmark-fill"></i><br />
              Paper
            </button>

            <button
              class="btn btn-info btn-lg px-4 py-3 text-dark"
              onclick="playGame('scissors')"
            >
              <i class="bi bi-scissors"></i><br />
              Scissors
            </button>
          </div>

          <!-- Result Card -->
          <div class="card bg-info-subtle border border-warning shadow-lg">
            <div class="card-body">
              <h3 class="mb-3">Game Result</h3>

              <p class="fs-4" id="resultText">
                Choose one option to start the game.
              </p>

              <div class="row mt-4">
                <div class="col-md-6">
                  <h5>Your Choice</h5>

                  <p id="userChoice" class="fs-3 text-success">-</p>
                </div>

                <div class="col-md-6">
                  <h5>Computer Choice</h5>

                  <p id="computerChoice" class="fs-3 text-danger">-</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
