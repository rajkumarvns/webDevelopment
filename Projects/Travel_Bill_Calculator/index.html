<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Travel Bill Calculator</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card shadow-lg main-card">
        <!-- Header -->
        <div class="card-header text-center">
          <h2>Travel Bill Calculator</h2>
        </div>

        <!-- Body -->
        <div class="card-body">
          <!-- Input -->
          <div class="mb-3">
            <label class="form-label fw-bold"> Enter Kilometers Covered </label>

            <input
              type="number"
              id="kmInput"
              class="form-control"
              placeholder="Enter kilometers"
            />

            <!-- Error Message -->
            <div id="error"></div>
          </div>

          <!-- Button -->
          <button id="calculateBtn" class="btn btn-primary w-100">
            Calculate Bill
          </button>

          <!-- Result -->
          <div id="resultSection" class="result-box d-none">
            <h4 class="mt-4 text-primary">
              Total Bill = <span id="totalBill"></span>
            </h4>

            <hr />

            <h5>Calculation Breakdown</h5>

            <div id="breakdown"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
  </body>
</html>
