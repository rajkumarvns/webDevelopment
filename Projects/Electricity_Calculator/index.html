<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Electricity Bill Calculator</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="bill-card">
        <h2 class="text-center text-white mb-4">Electricity Bill Calculator</h2>

        <!-- Input -->
        <div class="input-group mb-3">
          <span class="input-group-text">
            <i class="bi bi-lightning-charge-fill text-warning"></i>
          </span>

          <input
            type="number"
            id="Units"
            class="form-control"
            placeholder="Enter Units"
          />
        </div>

        <!-- Buttons -->
        <div class="d-grid gap-3">
          <button class="btn btn-success" id="submit">Calculate Bill</button>

          <button class="btn btn-danger" id="reset">Clear</button>
        </div>

        <!-- Result -->
        <div id="result" class="card p-3 mt-4 d-none">
          <h4 class="text-center mb-3 text-primary">Bill Details</h4>

          <p id="slab1"></p>
          <p id="slab2"></p>
          <p id="slab3"></p>
          <p
            id="slab4"
            class="text-success d-flex justify-content-center fw-bold fs-2"
          ></p>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
  </body>
</html>
