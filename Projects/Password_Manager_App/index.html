<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-dark text-light">
    <header class="bg-primary text-light p-3 text-center">
      <div class="d-flex justify-content-between align-items-center">
        <h2>Password Manager</h2>

        <div class="d-flex gap-5">
          <a href="index.html" class="text-decoration-none text-white fs-5"
            >Add new Password</a
          >
          <a href="showPass.html" class="text-decoration-none text-white fs-5"
            >View Saved Password</a
          >
        </div>
      </div>
    </header>

    <main>
      <div class="w-50 mx-auto rounded border p-3 mt-4">
        <form class="d-grid gap-3" id="passFrom">
          <!-- Website Name -->
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-globe text-primary"></i>
            </span>

            <input
              type="text"
              name="siteName"
              id="siteName"
              placeholder="Enter the Web-site Name"
              class="form-control"
            />
          </div>

          <!-- Username -->
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person text-success"></i>
            </span>

            <input
              type="text"
              name="userName"
              id="userName"
              placeholder="Enter the User Name"
              class="form-control"
            />
          </div>

          <!-- Password -->
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock text-danger"></i>
            </span>

            <input
              type="password"
              name="password"
              id="password"
              placeholder="Enter the Password"
              class="form-control"
            />

            <button
              type="button"
              class="btn btn-outline-secondary"
              id="togglePassword"
            >
              <i class="bi bi-eye-slash text-warning" id="eyeIcon"></i>
            </button>
          </div>

          <div class="d-flex gap-3 justify-content-center">
            <button type="submit" class="btn btn-outline-primary">Save</button>

            <button type="reset" class="btn btn-outline-danger">Clear</button>
          </div>
        </form>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
