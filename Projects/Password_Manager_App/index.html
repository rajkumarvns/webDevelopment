<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-dark text-light">
    <header class="bg-primary p-3">
      <div class="container d-flex justify-content-between align-items-center">
        <h2>Password Manager</h2>

        <div class="d-flex gap-4">
          <a href="index.html" class="text-white text-decoration-none">
            Add Password
          </a>

          <a href="showPass.html" class="text-white text-decoration-none">
            View Passwords
          </a>
        </div>
      </div>
    </header>

    <main class="container mt-5">
      <div class="col-md-6 mx-auto border rounded p-4">
        <form id="passForm" class="d-grid gap-3">
          <!-- Website Input -->
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-globe text-primary"></i>
            </span>

            <input
              type="text"
              id="siteName"
              class="form-control"
              placeholder="Enter Website Name"
              required
            />
          </div>

          <!-- Username Input -->
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person-circle text-success"></i>
            </span>

            <input
              type="text"
              id="userName"
              class="form-control"
              placeholder="Enter Username"
              required
            />
          </div>

          <!-- Password Input -->
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock text-warning"></i>
            </span>

            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Enter Password"
              required
            />

            <!-- Eye Icon -->
            <span
              class="input-group-text"
              id="togglePassword"
              style="cursor: pointer"
            >
              <i class="bi bi-eye-slash text-danger" id="eyeIcon"></i>
            </span>
          </div>

          <!-- Buttons -->
          <div class="d-flex justify-content-center gap-3">
            <button type="submit" class="btn btn-outline-primary">Save</button>

            <button type="reset" class="btn btn-outline-danger">Clear</button>
          </div>
        </form>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
