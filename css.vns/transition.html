<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #Box {
        width: 100px;
        height: 100px;
        background: red;

        transition: background 1s linear 1s, border-radius linear 0s;
      }
      #Box:hover {
        background: yellow;
        border-radius: 100px;
      }
    </style>
  </head>
  <body>
    <div id="Box"></div>
  </body>
</html>
