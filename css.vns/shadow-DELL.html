<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow</title>
    <style>
      h1 {
        color: yellow;
        text-shadow: 5px 5px 5px blueviolet;
      }
      img {
        border: 6px solid black;
        box-shadow: 10px 10px 10px rgba(220, 227, 17, 0.2);
        border-radius: 20px;
      }
      #Camera {
        width: 10px;
        height: 10px;
        background: orange;
        border-radius: 100%;
        border: 2px double rgba(220, 227, 17);
        position: absolute;
        top: 89px;
        left: 17px;
      }
      #Home {
        width: 9px;
        height: 9px;
        background: aqua;
        border-radius: 100%;
        border: 1px solid;
        position: absolute;
        top: 275px;
        left: 70px;
      }
      #nav {
        width: 7px;
        height: 7px;
        background: aqua;

        border: 1px solid;
        position: absolute;
        top: 275px;
        left: 30px;
      }
      .back {
        width: 1px;
        height: 1px;
        border-top: 4px solid transparent;
        border-left: 6px solid aqua;
        border-bottom: 4px solid transparent;
        position: absolute;
        top: 276px;
        left: 110px;
      }

      body {
        background-image: url("security.png");
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <section>
      <a href="https://www.google.com"><div id="Camera"></div></a>
    </section>
    <section>
      <a href="https://www.youtube.com"><div id="Home"></div></a>
    </section>
    <section>
      <a href="https://www.flipkart.com"><div id="nav"></div></a>
    </section>

    <section>
      <a href="https://www.chrome.com"><div class="back"></div></a>
    </section>

    <h1>
      <i style="color: rgb(0, 255, 0)">Welcome</i> to My<b
        style="color: rgb(238, 94, 16)"
        >World</b
      >
    </h1>

    <section>
      <a href="https://amazon.com" target="main">
        <img src="developer.jpeg" width="120px" height="200px" alt="image"
      /></a>
    </section>
    <h4 style="color: aqua">
      <i
        ><sup><b>RAJ</b></sup> GUPTA</i
      >
    </h4>
  </body>
</html>
