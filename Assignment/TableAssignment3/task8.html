<body>

  <h3 align="center">Creative HTML Table Layout with Merged Cells</h3>
  <hr />

  <h3 align="center">Description:</h3>
  <p>
    This webpage demonstrates a creatively structured HTML table using rowspan
    and colspan attributes to form a sentence-like layout.
  </p>

  <hr />
  <br />

  <!-- Table -->
  <table border="1" cellspacing="0" cellpadding="8" align="center">

    <thead>
      <tr>
        <th>Quick</th>
        <th colspan="2">Brown Fox</th>
        <th>Jumps</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td rowspan="3">Over the</td>
        <td>lazy</td>
        <td>dog</td>
        <td>and</td>
      </tr>

      <tr>
        <td>then</td>
        <td>it</td>
        <td>fell</td>
      </tr>

      <tr>
        <td colspan="3">prey to a lion</td>
      </tr>
    </tbody>

  </table>
