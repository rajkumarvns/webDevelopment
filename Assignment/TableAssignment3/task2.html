  <h3 align="center">HTML Table with Colspan and Nested Table</h3>
  <hr />

  <h3 align="center">Description:</h3>
  <p>
    This webpage demonstrates the use of advanced table features in HTML,
    including column spanning (colspan) and nested tables.
  </p>

  <hr />
  <br />

  <!-- Main Table -->
  <table border="1" cellspacing="0" cellpadding="8" align="center">

    <thead>
      <tr>
        <th colspan="2">CI</th>
        <th>All Genders</th>
        <th>By Genders</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <th>Rural</th>
        <td>652148</td>
        <td>4215389</td>

        <!-- Nested Table -->
        <td>
          <table border="1" cellspacing="0" cellpadding="5">
            <tr>
              <th>Males</th>
              <th>Females</th>
            </tr>
            <tr>
              <td>9215604</td>
              <td>4512358</td>
            </tr>
          </table>
        </td>
      </tr>
    </tbody>

  </table>
