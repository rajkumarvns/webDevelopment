<body>

  <h3 align="center">
    Complex HTML Table Layout with Multiple Rowspan and Colspan
  </h3>
  <hr />

  <h3 align="center">Description:</h3>
  <p>
    This webpage demonstrates an advanced HTML table structure using extensive
    combinations of rowspan and colspan.
  </p>

  <hr />
  <br />

  <table border="1" cellspacing="0" cellpadding="8" align="center">
    
    <caption><b>Advanced Table Layout</b></caption>

    <tbody>

      <tr>
        <td>1</td>
        <td colspan="2">2</td>
        <td rowspan="2">3</td>
        <td colspan="2" rowspan="2">4</td>
      </tr>

      <tr>
        <td colspan="3">5</td>
      </tr>

      <tr>
        <td>6</td>
        <td>7</td>
        <td>8</td>
        <td colspan="2">9</td>
        <td>10</td>
      </tr>

      <tr>
        <td colspan="2">11</td>
        <td colspan="3">12</td>
        <td rowspan="7">13</td>
      </tr>

      <tr>
        <td rowspan="3">14</td>
        <td>15</td>
        <td>16</td>
        <td>17</td>
        <td>18</td>
      </tr>

      <tr>
        <td colspan="4">19</td>
      </tr>

      <tr>
        <td colspan="2">20</td>
        <td colspan="2">21</td>
      </tr>

      <tr>
        <td colspan="5">22</td>
      </tr>

      <tr>
        <td rowspan="2">23</td>
        <td colspan="2">24</td>
        <td>25</td>
        <td>26</td>
      </tr>

      <tr>
        <td>27</td>
        <td colspan="2">28</td>
        <td>29</td>
      </tr>

    </tbody>

  </table>
