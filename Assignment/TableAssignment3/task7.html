<body>

  <h3 align="center">HTML Tables with Rowspan and Colspan Examples</h3>
  <hr />

  <h3 align="center">Description:</h3>
  <p>
    This webpage demonstrates multiple HTML table layouts using rowspan and
    colspan attributes.
  </p>

  <hr />
  <br />

  <!-- Table 1 -->
  <h4 align="center">Example 1</h4>

  <table border="1" cellspacing="0" cellpadding="8" align="center">
    <tbody>
      <tr>
        <td colspan="2">A</td>
        <td rowspan="3">B</td>
      </tr>
      <tr>
        <td rowspan="2">C</td>
        <td>D</td>
      </tr>
      <tr>
        <td>E</td>
      </tr>
    </tbody>
  </table>

  <br /><br />

  <!-- Table 2 -->
  <h4 align="center">Example 2</h4>

  <table border="1" cellspacing="0" cellpadding="8" align="center">
    <tbody>
      <tr>
        <td rowspan="3">1</td>
        <td>2</td>
        <td>3</td>
        <td rowspan="3">4</td>
      </tr>
      <tr>
        <td colspan="2">5</td>
      </tr>
      <tr>
        <td>6</td>
        <td>7</td>
      </tr>
    </tbody>
  </table>

  <br />
