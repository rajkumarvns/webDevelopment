<!doctype html>

<body>

  <h3 align="center">
    Quarterly Sales Report Table Using Rowspan and Colspan
  </h3>
  <hr />

  <h3 align="center">Description:</h3>
  <p>
    This webpage displays a structured sales report using an HTML table with
    both rowspan and colspan attributes.
  </p>

  <hr />
  <br />

  <!-- Table -->
  <table border="1" cellspacing="0" cellpadding="8" align="center">

    <thead>
      <tr>
        <th rowspan="2">Category</th>
        <th colspan="2">Q1</th>
        <th colspan="2">Q2</th>
      </tr>
      <tr>
        <th>January</th>
        <th>February</th>
        <th>March</th>
        <th>April</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Electronics</td>
        <td>$1000</td>
        <td>$1500</td>
        <td>$2000</td>
        <td>$2500</td>
      </tr>

      <tr>
        <td>Clothing</td>
        <td>$2000</td>
        <td>$2500</td>
        <td>$3000</td>
        <td>$3500</td>
      </tr>
    </tbody>

  </table>

  <br />
  <hr />
  <br /><br />

  </a>

</body>
</html>
