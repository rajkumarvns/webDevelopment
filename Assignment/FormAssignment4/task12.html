<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Appointment Form</title>
  </head>
  <body>
    <form>
      <table align="center">
        <tr>
          <td><img src="./image.png" alt="doctor image" width="208px" /></td>
          <td>
            <strong>Doctor Appointment Form</strong>
            <hr />
            <label for="Appointment">Appointment Date </label>
            <input type="date" id="Appointment" />
            <br /><br />
            <label for="time">Appointment Time </label>
            <input type="time" id="time" />
            <br /><br />
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="First" />
            <input type="text" id="name" placeholder="Last" />
            <br /><br />
            Gender:
            <label for="male">Male</label>
            <input type="radio" name="male" />
            <label for="female">Female</label>
            <input type="radio" name="male" />
            <br /><br />

            <label for="name">Phone</label>
            <input type="number" id="number" placeholder="####" />
            <br /><br />
            <label for="address">Address</label>
            <input type="text" id="state" placeholder="city" />
            <input type="text" id="city" placeholder="state" />
            <br /><br />
            <span>Your Query </span>
            <textarea name="query"> </textarea>
            <br /><br />
            <p>Appointment Type</p>
            <span>Select which Appointment type(s) you require</span>
            <br />
            <input type="checkbox" />
            <label for="checkup">Cervix checkup</label>
            <br />
            <input type="checkbox" />
            <label for="checkup">Heart checkup</label>
            <br />
            <input type="checkbox" />
            <label for="checkup">Eye check-up</label>
            <br />
            <input type="checkbox" />
            <label for="checkup">Heaing Test</label>
            <br /><br />
            <button type="submit">Send</button>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
