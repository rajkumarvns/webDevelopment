<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Appointment Form</title>
</head>

<body>

  <h3 align="center">Doctor Appointment Booking Form</h3>
  <hr />

  <h3 align="center">Description:</h3>
  <p>
    This webpage features a doctor appointment form designed to schedule
    medical visits.
  </p>

  <hr />
  <br />

  <form>

    <table align="center" cellpadding="10">

      <tr>
        <td>
          <img src="./image.png" alt="Doctor Image" width="208px" />
        </td>

        <td>
          <h3>Doctor Appointment Form</h3>
          <hr />

          <!-- Date & Time -->
          <label for="appointment_date">Appointment Date:</label>
          <input type="date" id="appointment_date" name="appointment_date" />
          <br /><br />

          <label for="appointment_time">Appointment Time:</label>
          <input type="time" id="appointment_time" name="appointment_time" />
          <br /><br />

          <!-- Name -->
          <label>Full Name:</label>
          <input type="text" name="first_name" placeholder="First Name" required />
          <input type="text" name="last_name" placeholder="Last Name" required />
          <br /><br />

          <!-- Gender -->
          <label>Gender:</label>
          <input type="radio" id="male" name="gender" value="male" />
          <label for="male">Male</label>

          <input type="radio" id="female" name="gender" value="female" />
          <label for="female">Female</label>
          <br /><br />

          <!-- Phone -->
          <label for="phone">Phone:</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter phone number" />
          <br /><br />

          <!-- Address -->
          <label>Address:</label>
          <input type="text" name="city" placeholder="City" />
          <input type="text" name="state" placeholder="State" />
          <br /><br />

          <!-- Query -->
          <label for="query">Your Query:</label><br />
          <textarea id="query" name="query" rows="4" cols="30"></textarea>
          <br /><br />

          <!-- Appointment Type -->
          <p><strong>Appointment Type</strong></p>
          <span>Select which appointment type(s) you require:</span>
          <br />

          <input type="checkbox" id="cervix" name="appointment_type" value="cervix" />
          <label for="cervix">Cervix Checkup</label><br />

          <input type="checkbox" id="heart" name="appointment_type" value="heart" />
          <label for="heart">Heart Checkup</label><br />

          <input type="checkbox" id="eye" name="appointment_type" value="eye" />
          <label for="eye">Eye Checkup</label><br />

          <input type="checkbox" id="hearing" name="appointment_type" value="hearing" />
          <label for="hearing">Hearing Test</label><br /><br />

          <!-- Buttons -->
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>

        </td>
      </tr>

    </table>

  </form>

  <br />
  <hr />
  <br />

  <!-- Navigation -->
  <a href="../index.html">
    <button type="button"><b>Back to Home</b></button>
  </a>

  <a href="../FormAssignment4/subIndex.html">
    <button type="button"><b>Back to Category</b></button>
  </a>

</body>
</html>
