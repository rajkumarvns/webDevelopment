<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApplicationFormTask4</title>
  </head>
  <body>
    <form>
      <h1>Application Form</h1>
      <br />
      <label for="firstname">First Name:</label>
      <input type="text" id="firstname" />
      <label for="lastname">Last Name:</label>
      <input type="text" id="lastname" />
      <br /><br />

      <label for="birthdate">Date of Birth:</label>
      <input type="date" id="birthdate" />
      <label for="age">Age:</label>
      <input type="number" id="age" />
      <br />
      <br />
      Gender:
      <select id="Gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
      <label for="email Address">Email Address:</label>
      <input type="text" id="email Address" placeholder="Enter email address" />
      <br /><br />
      Position Available:
      <input type="radio" />
      <label for="Junior Developer">Junior Developer</label>

      <input type="radio" />
      <label for="Mid-Level Developer">Mid-Level Developer</label>

      <input type="radio" />
      <label for="Senior Developer">Senior Developer</label>
      <br /><br />

      Programming Languages:
      <input type="checkbox" />
      <label for="Java">Java</label>

      <input type="checkbox" />
      <label for="JavaScript">JavaScript</label>

      <input type="checkbox" />
      <label for="Python">Python</label>
      <br /><br />
      <label for="password">Password:</label>
      <input type="password" />
      <label for="cnfPassword">Confirm Password:</label>
      <input type="Password" />
      <br /><br />
      <button type="button">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
