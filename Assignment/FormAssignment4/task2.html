<!doctype html>

  <head>

    <title>HTMLFormTask2</title>
  </head>
  <body>
    <form>
      <p>Please enter your personal details:</p>
      <label for="firstname"
        ><u><b>F</b></u
        >irst name:*</label
      >
      <input type="text" id="firstname" />
      <br /><br />
      <label for="lastname"
        ><u><b>L</b></u
        >ast name:*</label
      >
      <input type="text" id="lastname" />
      <br /><br />
      <label for="streetAddress"
        >Street <u><b>a</b></u
        >ddress:</label
      >
      <input type="text" id="streetAddress" />
      <br /><br />

      <label for="town/city"
        ><u><b>T</b></u
        >own/city:</label
      >
      <input type="text" id="town/city" />
      <br /><br />

      <label for="postcode/zip"
        >Post<u><b>c</b></u
        >ode/zip:</label
      >
      <input type="text" id="postcode/zip" />
      <br /><br />

      <label for="telephone"
        >Tele<u><b>p</b></u
        >hone:</label
      >
      <input type="text" id="telephone" />
      <br /><br />

      <label for="mobile"
        ><u><b>M</b></u
        >obile:</label
      >
      <input type="text" id="mobile" />
      <br /><br />

      <label for="email"
        ><u><b>E</b></u
        >mail address:*</label
      >
      <input type="email" id="email" />
      <br /><br />
      Fields marked * are required.
      <br /><br />

      <button type="submit">
        <u><b>S</b></u
        >ubmit
      </button>
    </form>
  </body>
