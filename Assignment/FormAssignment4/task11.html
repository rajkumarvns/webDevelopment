<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTMLFormTask11</title>
  </head>
  <body>
    <table border="1">
      <form>
        <tr>
          <th colspan="4">Registration Form</th>
        </tr>
        <tr>
          <td>Student Name</td>
          <td>
            <input type="text" placeholder="First Name" />
          </td>
          <td>
            <input type="text" placeholder="Middle Name" />
          </td>
          <td>
            <input type="text" placeholder="Last Name" />
          </td>
        </tr>
        <tr>
          <td>Father's Name</td>
          <td>
            <input type="text" placeholder="Enter Your Father's Name" />
          </td>
          <td>Mother's Name</td>
          <td>
            <input type="text" placeholder="Enter Your Mother's Name" />
          </td>
        </tr>
        <tr>
          <td>Date of Birth</td>
          <td>
            <input type="date" />
          </td>
          <td>Gender</td>
          <td>
            <input type="radio" id="male" name="size" />
            <label for="male">Male</label>
            <input type="radio" id="famale" name="size" />
            <label for="female">Female</label>
          </td>
        </tr>

        <tr>
          <td>Category</td>
          <td>
            <input type="radio" id="gen" name="size" />
            <label for="gen">Gen</label>
            <input type="radio" id="obc" name="size" />
            <label for="obc">OBC</label>
            <input type="radio" id="sc/st" name="size" />
            <label for="sc/st">SC/ST</label>
          </td>
          <td>Handicapped</td>
          <td>
            <label for="male">Yes</label>
            <input type="radio" id="yes" name="Yes" />
            <label for="no">No</label>
            <input type="radio" id="no" name="Yes" />
          </td>
        </tr>
        <tr>
          <td>Ex-Serviceman</td>
          <td>
            <label for="male">Yes</label>
            <input type="radio" id="yes" name="Yes" />
            <label for="no">No</label>
            <input type="radio" id="no" name="Yes" />
          </td>
          <td>EWS</td>
          <td>
            <label for="male">Yes</label>
            <input type="radio" id="yes" name="Yes" />
            <label for="no">No</label>
            <input type="radio" id="no" name="Yes" />
          </td>
        </tr>
        <tr>
          <td>Email ID</td>
          <td>
            <input type="text" />
          </td>
          <td>Mobile No.</td>
          <td>
            <input type="number" />
          </td>
        </tr>
        <tr>
          <td>State</td>
          <td>
            <select name="dropdown">
              <option value="state">select any One</option>
            </select>
          </td>
          <td>City</td>
          <td>
            <select name="dropdown">
              <option value="state">select any One</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Upload Photo</td>
          <td>
            <input type="file" accept="image" />
          </td>
          <td>Upload Signature</td>
          <td>
            <input type="file" accept="image,.pdf" />
          </td>
        </tr>
        <tr>
          <td></td>
          <th colspan="3">
            <button type="button">Submit</button>
          </th>
        </tr>
      </form>
    </table>
    <hr />
    <br />
    <br />
    <button type="submit">
      <a href="../index.html"><b>Back to Home</b></a>
    </button>
    <button type="submit">
      <a href="../FormAssignment4/subIndex.html"><b>Back to Category</b></a>
    </button>
  </body>
</html>
