<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>String</title>
  </head>
  <body>
    <h2>This is String Practice</h2>
    <span class="blink-text">This text blink!</span>
    <style>
      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      .blink-text {
        animation: blink 10s infinite;
      }
    </style>
    <script src="script.js"></script>
  </body>
</html>
