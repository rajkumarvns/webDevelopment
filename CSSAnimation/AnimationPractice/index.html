<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animation Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1 -->
  <div class="move-box"></div>

  <!-- 2 -->
  <div class="ball"></div>

  <!-- 3 -->
  <div class="square"></div>

  <!-- 4 -->
  <div class="circle"></div>

  <!-- 5 -->
  <h2 class="fade-text">Welcome!</h2>

  <!-- 6 -->
  <img src="image.jpg" class="zoom-img" alt="Zoom Image">

  <!-- 7 -->
  <div class="spinner"></div>

  <!-- 8 -->
  <div class="change-box"></div>

  <!-- 9 -->
  <h3 class="blink-text">Blinking Text</h3>

  <!-- 10 -->
  <button class="pulse-btn">Pulse Button</button>

  <!-- 11 -->
  <div class="traffic-light">
    <div class="light red"></div>
    <div class="light yellow"></div>
    <div class="light green"></div>
  </div>

  <!-- 12 -->
  <div class="flip-card"></div>

  <!-- 13 -->
  <div class="real-ball"></div>

  <!-- 14 -->
  <div class="heart"></div>

  <!-- 15 -->
  <div class="up-down"></div>

</body>
</html>
